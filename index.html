<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder AI | Career Intelligence</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Warm Palette from Reference Image 5 */
            --primary: #D97706; /* Amber */
            --secondary: #3E2723; /* Dark Brown */
            --tertiary: #5D4037; /* Medium Brown */
            --neutral-bg: #FCF9F2; /* Neutral Cream */
            --surface: #F3EFE7; /* Light Surface */
            --border: #E5E1D8; /* Border Color */
            --text-main: #1A1A1A;
            --text-dim: #6B7280;
            
            --font-head: 'Inter', sans-serif;
            --font-body: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--neutral-bg);
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 70px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            gap: 30px;
        }

        .side-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: var(--tertiary);
            cursor: pointer;
            transition: 0.3s;
        }

        .side-btn:hover, .side-btn.active {
            background: var(--primary);
            color: white;
        }

        .side-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- MAIN AREA --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 65px;
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: var(--font-head);
            background: var(--neutral-bg);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* SVG Icon Recreated from Reference Image 8 */
        .logo-svg {
            width: 32px;
            height: 32px;
        }

        .header-title {
            font-weight: 800;
            font-size: 18px;
            color: var(--secondary);
            letter-spacing: -0.5px;
            text-transform: none; /* Changed to match requested "Pathfinder AI" */
        }

        /* --- CHATBOX --- */
        #chat-window {
            flex: 1;
            padding: 40px 15%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
            scroll-behavior: smooth;
        }

        .log-entry {
            animation: fadeIn 0.4s ease;
            line-height: 1.8;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .sys-info {
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .user-prompt {
            color: var(--primary);
            font-weight: bold;
            margin-right: 12px;
        }

        .ai-response-box {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            font-size: 14px;
            color: var(--text-main);
            box-shadow: 0 2px 10px rgba(62, 39, 35, 0.03);
            white-space: pre-line;
        }

        /* --- INPUT PANEL --- */
        footer {
            padding: 30px 15%;
            background: var(--neutral-bg);
            border-top: 1px solid var(--border);
        }

        .input-bar {
            background: white;
            border: 1px solid var(--border);
            padding: 12px 25px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-family: var(--font-body);
            font-size: 15px;
            color: var(--text-main);
        }

        .execute-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-family: var(--font-head);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .execute-btn:hover {
            background: var(--primary);
        }

        .loader {
            font-size: 12px;
            color: var(--primary);
            margin-bottom: 10px;
            display: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <aside>
        <div class="side-btn active"><i class="fas fa-terminal"></i></div>
        <div class="side-btn"><i class="fas fa-route"></i></div>
        <div class="side-btn"><i class="fas fa-id-badge"></i></div>
        <div class="side-bottom">
            <div class="side-btn" onclick="clearAllData()"><i class="fas fa-trash-alt"></i></div>
            <div class="side-btn"><i class="fas fa-cog"></i></div>
        </div>
    </aside>

    <main>
        <header>
            <div class="brand-container">
                <!-- SVG Branding Icon from Reference Image 8 -->
                <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" rx="20" fill="#F3EFE7"/>
                    <path d="M25 75L45 45L65 60L85 25" stroke="#D97706" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="25" cy="75" r="8" fill="#3E2723"/>
                    <circle cx="85" cy="25" r="8" fill="#3E2723"/>
                </svg>
                <div class="header-title">Pathfinder AI</div>
            </div>
            <div id="session-tag" style="font-size: 11px; color: var(--primary); font-family: var(--font-body);">SESSION: STD-000</div>
        </header>

        <div id="chat-window">
            <!-- Content loaded via JavaScript -->
        </div>

        <footer>
            <div id="status-msg" class="loader">KERNEL: ANALYZING_VECTORS...</div>
            <div class="input-bar">
                <span class="user-prompt">pathfinder ></span>
                <input type="text" id="cmd-input" placeholder="Enter your career query..." autocomplete="off" onkeypress="if(event.key==='Enter') runSystemQuery()">
                <button class="execute-btn" onclick="runSystemQuery()">Execute</button>
            </div>
        </footer>
    </main>

    <script>
        const API_KEY = 'sk-default-U39NQBuInIefuXIEZaSkphO02WFwc3tR';
        const AGENT_ID = '6a1d12b3a23278ef63b5371c';
        const USER_ID = 'krishshreesurya@gmail.com';

        // 1. Initialize Persistence
        let sessionId = localStorage.getItem('pf_session_id');
        if (!sessionId) {
            sessionId = 'STD-' + Math.floor(Math.random() * 900 + 100);
            localStorage.setItem('pf_session_id', sessionId);
        }
        document.getElementById('session-tag').innerText = `SESSION: ${sessionId}`;

        // Load History
        window.onload = () => {
            const history = localStorage.getItem('pf_history_log');
            if (history) {
                document.getElementById('chat-window').innerHTML = history;
                scrollBottom();
            } else {
                renderResponse("System initialized. Welcome to Pathfinder AI. I am ready to assist you with your career roadmap, resume optimization, and interview preparation. How can I help you today?", 'bot');
            }
        };

        // 2. Query System
        async function runSystemQuery() {
            const input = document.getElementById('cmd-input');
            const query = input.value.trim();
            if (!query) return;

            // Log user message
            renderResponse(query, 'user');
            input.value = '';

            // Show Loader
            document.getElementById('status-msg').style.display = 'block';
            scrollBottom();

            try {
                const response = await fetch('https://agent-prod.studio.lyzr.ai/v3/inference/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
                    body: JSON.stringify({
                        "user_id": USER_ID,
                        "agent_id": AGENT_ID,
                        "session_id": sessionId,
                        "message": query
                    })
                });

                const data = await response.json();
                let rawOutput = data.response || data.message || "Query executed successfully.";

                // 3. Clean the output (Remove # and *)
                let cleanOutput = rawOutput.replace(/[#*]/g, '');

                document.getElementById('status-msg').style.display = 'none';
                renderResponse(cleanOutput, 'bot');

            } catch (err) {
                document.getElementById('status-msg').style.display = 'none';
                renderResponse("System Error: Communication with the intelligence cluster was interrupted.", 'bot');
            }
        }

        // 4. UI Rendering
        function renderResponse(text, type) {
            const window = document.getElementById('chat-window');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            if (type === 'user') {
                entry.innerHTML = `<span class="user-prompt">pathfinder ></span> ${text}`;
            } else {
                entry.innerHTML = `
                    <div class="sys-info">[RESPONSE_LOG]</div>
                    <div class="ai-response-box">${text}</div>
                `;
            }

            window.appendChild(entry);
            
            // Save to database (localStorage)
            localStorage.setItem('pf_history_log', window.innerHTML);
            scrollBottom();
        }

        function scrollBottom() {
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        }

        function clearAllData() {
            if (confirm("Wipe all local session data and history?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
