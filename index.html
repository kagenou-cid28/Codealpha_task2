<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder AI | Career Intelligence</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #D97706; 
            --secondary: #3E2723; 
            --tertiary: #5D4037; 
            --neutral-bg: #FCF9F2; 
            --surface: #F3EFE7; 
            --border: #E5E1D8; 
            --text-main: #1A1A1A;
            --text-dim: #6B7280;
            --font-head: 'Inter', sans-serif;
            --font-body: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--neutral-bg);
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        aside {
            width: 70px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            gap: 30px;
        }

        .side-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: var(--tertiary);
            cursor: pointer;
            transition: 0.3s;
        }

        .side-btn.active { background: var(--primary); color: white; }

        main { flex: 1; display: flex; flex-direction: column; }

        header {
            height: 65px;
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--neutral-bg);
        }

        .brand-container { display: flex; align-items: center; gap: 12px; }
        .logo-svg { width: 32px; height: 32px; }

        .header-title {
            font-weight: 800;
            font-size: 18px;
            color: var(--secondary);
            font-family: var(--font-head);
        }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .log-entry { line-height: 1.6; font-size: 14px; }
        .user-prompt { color: var(--primary); font-weight: bold; }
        
        .ai-response-box {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            white-space: pre-line;
        }

        footer { padding: 20px; border-top: 1px solid var(--border); }
        .input-bar {
            background: white;
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input { flex: 1; border: none; outline: none; font-family: var(--font-body); }
        .exec-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-head);
            font-weight: 600;
        }

        .loader { font-size: 11px; color: var(--primary); margin-bottom: 5px; display: none; }

        @media (min-width: 768px) {
            #chat-window, footer { padding-left: 15%; padding-right: 15%; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="side-btn active"><i class="fas fa-terminal"></i></div>
        <div class="side-btn" onclick="location.reload()"><i class="fas fa-sync"></i></div>
        <div class="side-bottom">
            <div class="side-btn" onclick="clearData()"><i class="fas fa-trash"></i></div>
        </div>
    </aside>

    <main>
        <header>
            <div class="brand-container">
                <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" rx="20" fill="#F3EFE7"/>
                    <path d="M25 75L45 45L65 60L85 25" stroke="#D97706" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="25" cy="75" r="8" fill="#3E2723"/>
                    <circle cx="85" cy="25" r="8" fill="#3E2723"/>
                </svg>
                <div class="header-title">Pathfinder AI</div>
            </div>
            <div id="tag" style="font-size: 10px; color: var(--primary);">SESSION ACTIVE</div>
        </header>

        <div id="chat-window"></div>

        <footer>
            <div id="load" class="loader">ANALYZING DATA...</div>
            <div class="input-bar">
                <span class="user-prompt">pathfinder ></span>
                <input type="text" id="user-in" placeholder="Ask your question..." onkeypress="if(event.key==='Enter') runQuery()">
                <button class="exec-btn" onclick="runQuery()">Send</button>
            </div>
        </footer>
    </main>

    <script>
        const API = 'sk-default-U39NQBuInIefuXIEZaSkphO02WFwc3tR';
        const AID = '6a1d12b3a23278ef63b5371c';
        const UID = 'krishshreesurya@gmail.com';

        let sid = localStorage.getItem('pf_sid') || 'SID-' + Math.floor(Math.random()*999);
        localStorage.setItem('pf_sid', sid);

        window.onload = () => {
            const hist = localStorage.getItem('pf_hist');
            if(hist) { 
                document.getElementById('chat-window').innerHTML = hist; 
                scroll(); 
            } else {
                render("Hello! I am Pathfinder AI. How can I help with your career today?", 'bot');
            }
        };

        async function runQuery() {
            const el = document.getElementById('user-in');
            const val = el.value.trim();
            if(!val) return;

            render(val, 'user');
            el.value = '';
            document.getElementById('load').style.display = 'block';

            try {
                const res = await fetch('https://agent-prod.studio.lyzr.ai/v3/inference/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': API },
                    body: JSON.stringify({ "user_id": UID, "agent_id": AID, "session_id": sid, "message": val })
                });
                const data = await res.json();
                let output = (data.response || data.message || "Done.").replace(/[#*]/g, '');
                document.getElementById('load').style.display = 'none';
                render(output, 'bot');
            } catch(e) {
                document.getElementById('load').style.display = 'none';
                render("Connection error.", 'bot');
            }
        }

        function render(txt, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = type === 'user' ? `<span class="user-prompt">pathfinder ></span> ${txt}` : `<div class="ai-response-box">${txt}</div>`;
            win.appendChild(div);
            localStorage.setItem('pf_hist', win.innerHTML);
            scroll();
        }

        function scroll() { const w = document.getElementById('chat-window'); w.scrollTop = w.scrollHeight; }
        function clearData() { if(confirm("Wipe history?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
